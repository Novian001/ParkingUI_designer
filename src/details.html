<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Details - Alif Park</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet" />
    <link href="./output.css" rel="stylesheet" />
  <base target="_blank">
</head>
  <body class="font-poppins text-[#070625] bg-[#F0F0F5] min-h-screen">
    <section
      class="max-w-[640px] w-full min-h-screen mx-auto flex flex-col bg-[#FBFBFB] overflow-x-hidden relative shadow-2xl">

      <div class="bg-white w-full h-[120px] absolute top-0"></div>

      <div class="flex flex-col w-full pb-24 z-10">
        <!-- ===== HEADER ===== -->
        <div class="flex items-center gap-4 p-[16px_20px] pt-6">
          <a href="index.html" class="flex justify-center items-center w-[40px] h-[40px] rounded-full bg-[#F5F5F7] hover:bg-[#EBECFD] transition-colors shrink-0">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M9.57 5.93005L3.5 12.0001L9.57 18.0701" stroke="#070625" stroke-width="1.5" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M20.4999 12H3.66992" stroke="#070625" stroke-width="1.5" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
          <h1 class="text-lg font-semibold text-[#070625]">Booking Details</h1>
        </div>

        <!-- ===== PARKING INFO CARD ===== -->
        <div class="mx-5 p-5 bg-white rounded-[20px] shadow-[0_4px_20px_0_#0706250D] flex flex-col gap-4">
          <div class="flex items-center gap-4">
            <div class="w-[60px] h-[60px] rounded-2xl bg-[#EBECFD] flex items-center justify-center shrink-0">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 10V18C3 20.2091 4.79086 22 7 22H17C19.2091 22 21 20.2091 21 18V10M3 10L12 3L21 10M3 10H21" stroke="#3F46F9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 14V18" stroke="#3F46F9" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="flex flex-col gap-1">
              <p class="font-bold text-lg">Alif Park</p>
              <div class="flex items-center gap-3 text-[#9F9FB5] text-sm">
                <span class="flex items-center gap-1">
                  <svg width="14" height="14" viewBox="0 0 17 16" fill="none"><path d="M1.88 3.06667C2.41333 0.760003 5.88667 0.760003 6.41333 3.06667C6.72667 4.42 5.86667 5.56667 5.12 6.28C4.57333 6.8 3.71333 6.79334 3.16667 6.28C2.42667 5.56667 1.56667 4.42 1.88 3.06667Z" stroke="#9F9FB5" stroke-width="1.5"/><path d="M10.5467 11.0667C11.08 8.76 14.5733 8.76 15.1067 11.0667C15.42 12.42 14.56 13.5667 13.8067 14.28C13.26 14.8 12.3933 14.7933 11.8467 14.28C11.0933 13.5667 10.2333 12.42 10.5467 11.0667Z" stroke="#9F9FB5" stroke-width="1.5"/><path d="M8.5 3.33331H10.2867C11.52 3.33331 12.0933 4.85998 11.1667 5.67331L5.84 10.3333C4.91333 11.14 5.48667 12.6666 6.71333 12.6666H8.5" stroke="#9F9FB5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  1.3km
                </span>
                <span class="flex items-center gap-1">
                  <svg width="14" height="14" viewBox="0 0 17 16" fill="none"><path d="M6.28125 9.55325C6.28125 10.4132 6.94125 11.1066 7.76125 11.1066H9.43458C10.1479 11.1066 10.7279 10.4999 10.7279 9.75325C10.7279 8.93992 10.3746 8.65325 9.84792 8.46658L7.16125 7.53325C6.63458 7.34658 6.28125 7.05992 6.28125 6.24658C6.28125 5.49992 6.86125 4.89325 7.57458 4.89325H9.24792C10.0679 4.89325 10.7279 5.58658 10.7279 6.44658" stroke="#9F9FB5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M8.5 4V12" stroke="#9F9FB5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  $5/hr
                </span>
              </div>
            </div>
          </div>
          <hr class="border-[#ECECEF]" />
          <div class="flex justify-between items-center">
            <div class="flex flex-col gap-1">
              <p class="text-[#9F9FB5] text-sm">Parking Slot</p>
              <p class="font-bold text-2xl text-[#3F46F9]">A6</p>
            </div>
            <div class="flex flex-col gap-1 items-end">
              <p class="text-[#9F9FB5] text-sm">Floor</p>
              <p class="font-bold text-lg">Basement</p>
            </div>
          </div>
        </div>

        <!-- ===== DATE & TIME ===== -->
        <div class="mx-5 mt-6 flex flex-col gap-4">
          <h2 class="font-semibold text-lg">Date & Time</h2>

          <div class="flex flex-col gap-3">
            <label class="text-sm text-[#9F9FB5]">Date</label>
            <input type="date" value="2024-06-17" class="w-full p-4 bg-white rounded-[16px] border border-[#ECECEF] text-[#070625] font-medium focus:outline-none focus:border-[#3F46F9] focus:ring-2 focus:ring-[#3F46F9]/20 transition-all" />
          </div>

          <div class="flex gap-3">
            <div class="flex flex-col gap-3 w-full">
              <label class="text-sm text-[#9F9FB5]">Start Time</label>
              <input type="time" value="09:00" class="w-full p-4 bg-white rounded-[16px] border border-[#ECECEF] text-[#070625] font-medium focus:outline-none focus:border-[#3F46F9] focus:ring-2 focus:ring-[#3F46F9]/20 transition-all" />
            </div>
            <div class="flex flex-col gap-3 w-full">
              <label class="text-sm text-[#9F9FB5]">End Time</label>
              <input type="time" value="11:00" class="w-full p-4 bg-white rounded-[16px] border border-[#ECECEF] text-[#070625] font-medium focus:outline-none focus:border-[#3F46F9] focus:ring-2 focus:ring-[#3F46F9]/20 transition-all" />
            </div>
          </div>
        </div>

        <!-- ===== VEHICLE INFO ===== -->
        <div class="mx-5 mt-6 flex flex-col gap-4">
          <h2 class="font-semibold text-lg">Vehicle Information</h2>

          <div class="flex flex-col gap-3">
            <label class="text-sm text-[#9F9FB5]">License Plate</label>
            <input type="text" placeholder="B 1234 ABC" class="w-full p-4 bg-white rounded-[16px] border border-[#ECECEF] text-[#070625] font-medium placeholder:text-[#C5C5D3] focus:outline-none focus:border-[#3F46F9] focus:ring-2 focus:ring-[#3F46F9]/20 transition-all" />
          </div>

          <div class="flex flex-col gap-3">
            <label class="text-sm text-[#9F9FB5]">Vehicle Type</label>
            <div class="flex gap-3">
              <button type="button" class="vehicle-type flex-1 p-4 bg-white rounded-[16px] border-2 border-[#3F46F9] flex flex-col items-center gap-2 transition-all">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M5 16L3 16C2.44772 16 2 15.5523 2 15L2 11C2 9.89543 2.89543 9 4 9L5 9L5 7C5 5.89543 5.89543 5 7 5L15 5C16.1046 5 17 5.89543 17 7L17 9L18 9C19.1046 9 20 9.89543 20 11L20 15C20 15.5523 19.5523 16 19 16L17 16" stroke="#3F46F9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  <circle cx="7.5" cy="16.5" r="2.5" stroke="#3F46F9" stroke-width="1.5"/>
                  <circle cx="16.5" cy="16.5" r="2.5" stroke="#3F46F9" stroke-width="1.5"/>
                  <path d="M5 9L17 9" stroke="#3F46F9" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span class="font-semibold text-sm text-[#3F46F9]">Car</span>
              </button>
              <button type="button" class="vehicle-type flex-1 p-4 bg-white rounded-[16px] border border-[#ECECEF] flex flex-col items-center gap-2 hover:border-[#3F46F9] transition-all">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="18" cy="17" r="2" stroke="#9F9FB5" stroke-width="1.5"/>
                  <circle cx="6" cy="17" r="2" stroke="#9F9FB5" stroke-width="1.5"/>
                  <path d="M8 17H16" stroke="#9F9FB5" stroke-width="1.5"/>
                  <path d="M16 17L15 7H9L8 17" stroke="#9F9FB5" stroke-width="1.5"/>
                  <path d="M6 17L5 12H3" stroke="#9F9FB5" stroke-width="1.5" stroke-linecap="round"/>
                  <path d="M18 17L19 12H21" stroke="#9F9FB5" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span class="font-semibold text-sm text-[#9F9FB5]">Motorcycle</span>
              </button>
            </div>
          </div>
        </div>

        <!-- ===== PRICE SUMMARY ===== -->
        <div class="mx-5 mt-6 p-5 bg-white rounded-[20px] shadow-[0_4px_20px_0_#0706250D] flex flex-col gap-4">
          <h2 class="font-semibold text-lg">Price Summary</h2>
          <div class="flex flex-col gap-3">
            <div class="flex justify-between items-center">
              <p class="text-[#9F9FB5] text-sm">Parking Fee (2 hours)</p>
              <p class="font-semibold">$10.00</p>
            </div>
            <div class="flex justify-between items-center">
              <p class="text-[#9F9FB5] text-sm">Service Fee</p>
              <p class="font-semibold">$1.00</p>
            </div>
            <div class="flex justify-between items-center">
              <p class="text-[#9F9FB5] text-sm">Tax (10%)</p>
              <p class="font-semibold">$1.10</p>
            </div>
            <hr class="border-[#ECECEF]" />
            <div class="flex justify-between items-center">
              <p class="font-bold text-lg">Total</p>
              <p class="font-bold text-2xl text-[#3F46F9]">$12.10</p>
            </div>
          </div>
        </div>
      </div>

      <!-- ===== BOTTOM CTA ===== -->
      <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[640px] p-5 bg-white border-t border-[#ECECEF] z-10">
        <a href="success.html" class="block w-full p-4 bg-[#4041DA] rounded-[16px] text-white font-semibold text-center hover:bg-[#3334c0] transition-colors">
          Confirm Booking - $12.10
        </a>
      </div>
    </section>

    <script>
      // Vehicle type toggle
      document.querySelectorAll('.vehicle-type').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.vehicle-type').forEach(b => {
            b.classList.remove('border-2', 'border-[#3F46F9]');
            b.classList.add('border', 'border-[#ECECEF]');
            const text = b.querySelector('span');
            if (text) text.classList.remove('text-[#3F46F9]');
            if (text) text.classList.add('text-[#9F9FB5]');
            const paths = b.querySelectorAll('path, circle');
            paths.forEach(p => p.setAttribute('stroke', '#9F9FB5'));
          });
          this.classList.remove('border', 'border-[#ECECEF]');
          this.classList.add('border-2', 'border-[#3F46F9]');
          const text = this.querySelector('span');
          if (text) text.classList.remove('text-[#9F9FB5]');
          if (text) text.classList.add('text-[#3F46F9]');
          const paths = this.querySelectorAll('path, circle');
          paths.forEach(p => p.setAttribute('stroke', '#3F46F9'));
        });
      });
    </script>
  </body>
</html>
