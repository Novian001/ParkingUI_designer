      // Toggle heart/favorite
      function toggleHeart(btn) {
        const svg = btn.querySelector('.heart-icon');
        const isFilled = svg.getAttribute('fill') === '#FF4B4B';
        if (isFilled) {
          svg.setAttribute('fill', 'none');
          svg.querySelector('path').setAttribute('stroke', '#070625');
        } else {
          svg.setAttribute('fill', '#FF4B4B');
          svg.querySelector('path').setAttribute('stroke', '#FF4B4B');
        }
      }

      // Select parking slot
      let selectedSlot = 'A6';

      function selectSlot(element) {
        // Don't select occupied slots
        if (element.classList.contains('occupied')) return;

        // Remove selected from all slots
        document.querySelectorAll('.parking-slot').forEach(slot => {
          if (slot.classList.contains('selected')) {
            slot.classList.remove('selected');
            slot.classList.add('flex');
            slot.classList.remove('flex-col');
            // Reset to normal slot appearance
            slot.style.backgroundColor = '';
            slot.style.borderRight = '';
            const inner = slot.querySelector('div');
            if (inner) {
              inner.innerHTML = `<div class="w-full h-[42px] flex justify-start items-center font-semibold">${slot.dataset.slot}</div>`;
            }
          }
        });

        // Add selected to clicked slot
        element.classList.add('selected');
        element.style.backgroundColor = '#EBECFD';
        element.style.borderRight = '4px solid #3F46F9';

        const innerDiv = element.querySelector('div');
        innerDiv.innerHTML = `
          <div class="w-full h-[42px] flex flex-col justify-start items-center">
            <p class="text-[#3F46F9] font-extrabold text-xs">Selected</p>
            <p class="text-[#9F9FB5] font-semibold">${element.dataset.slot}</p>
          </div>
        `;

        selectedSlot = element.dataset.slot;
      }

      // Floor tab switching
      document.querySelectorAll('.floor-tab').forEach(tab => {
        tab.addEventListener('click', function() {
          // Reset all tabs
          document.querySelectorAll('.floor-tab').forEach(t => {
            t.classList.remove('bg-[#4041DA]');
            t.classList.add('bg-[#04031F]');
          });
          // Activate clicked tab
          this.classList.remove('bg-[#04031F]');
          this.classList.add('bg-[#4041DA]');
        });
      });
    </script>
  </body>
</html>
